name: Build Mobile Apps
'on':
  - push
  - pull_request
jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build with Buildozer
        uses: kivy/buildozer-action@v1
        with:
          workdir: .
          buildozer_version: master
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: android-apk
          path: bin/*.apk
  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install dependencies
        run: |
          python3 -m pip install kivy-ios
          brew install autoconf automake libtool pkg-config
      - name: Build iOS Project
        run: |
          toolchain build python3 kivy
          toolchain create "floppybird" .
          # Note: This creates the Xcode project. 
          # Exporting a signed IPA requires Apple Developer certificates.
      - name: Upload Xcode Project
        uses: actions/upload-artifact@v3
        with:
          name: ios-xcode-project
          path: floppybird-ios